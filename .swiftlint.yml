# DEEP ORBIT SwiftLint Configuration

# Rules
opt_in_rules:
  - closure_spacing
  - empty_count
  - explicit_init
  - fatal_error_message
  - first_where
  - sorted_first_last
  - implicit_return
  - last_where
  - modifier_order
  - overridden_super_call
  - private_outlet
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call

disabled_rules:
  - trailing_comma
  - todo
  - force_cast
  - large_tuple

# Metrics
line_length:
  warning: 160
  error: 200

file_length:
  warning: 500
  error: 800

function_body_length:
  warning: 60
  error: 100

type_body_length:
  warning: 300
  error: 500

function_parameter_count:
  warning: 5
  error: 8

# Nesting
nesting:
  type_level: 2
  function_level: 3

# Naming
type_name:
  min_length: 3
  max_length: 50

identifier_name:
  min_length: 1
  max_length: 50
  excluded:
    - id
    - x
    - y
    - i
    - r
    - g
    - b
    - dt
    - dx
    - dy

# Paths
excluded:
  - spritekitTests
  - spritekitUITests
  - spritekit.xcodeproj
